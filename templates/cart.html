{% extends "base.html" %}

{% block title %}Shopping Cart - Melody Store{% endblock %}

{% block content %}
<div class="cart-container">
    <h1 class="cart-title">Shopping Cart</h1>
    
    <div id="cart-content">
        <!-- Cart items will be loaded here -->
    </div>
</div>

<style>
.cart-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
}

.cart-title {
    font-size: 2rem;
    color: var(--dark);
    margin-bottom: 2rem;
    text-align: center;
}

.cart-with-items {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
}

.cart-items {
    background: var(--white);
    border-radius: 1rem;
    box-shadow: var(--shadow);
    overflow: hidden;
}

.cart-item {
    display: flex;
    gap: 1.5rem;
    padding: 1.5rem;
    border-bottom: 1px solid var(--gray);
    transition: background 0.2s;
}

.cart-item:hover {
    background: var(--light);
}

.cart-item-image {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--light), var(--white));
    border-radius: 0.5rem;
    padding: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.cart-item-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.cart-item-details {
    flex: 1;
}

.cart-item-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 0.5rem;
}

.cart-item-price {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 0.5rem;
}

.cart-item-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
}

.quantity-selector {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--light);
    border-radius: 2rem;
    padding: 0.25rem;
}

.quantity-btn {
    width: 32px;
    height: 32px;
    background: var(--white);
    border: 1px solid var(--gray);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.2s;
}

.quantity-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
}

.quantity-value {
    min-width: 40px;
    text-align: center;
    font-weight: 600;
}

.remove-btn {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    font-size: 0.875rem;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem;
    border-radius: 0.5rem;
    transition: all 0.2s;
}

.remove-btn:hover {
    background: #fee2e2;
}

.cart-item-total {
    font-weight: 600;
    color: var(--primary);
    min-width: 100px;
    text-align: right;
}

.cart-summary {
    background: var(--white);
    border-radius: 1rem;
    padding: 1.5rem;
    box-shadow: var(--shadow);
    height: fit-content;
    position: sticky;
    top: 100px;
}

.cart-summary h3 {
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--light);
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    color: var(--text);
    font-size: 0.875rem;
}

.summary-row.total {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--dark);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--gray);
}

.checkout-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    border: none;
    border-radius: 0.5rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.checkout-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.clear-cart-btn {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 1px solid var(--gray);
    border-radius: 0.5rem;
    color: var(--text-light);
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
}

.clear-cart-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
}

.cart-empty {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--white);
    border-radius: 1rem;
    box-shadow: var(--shadow);
}

.empty-icon {
    font-size: 5rem;
    color: var(--text-light);
    margin-bottom: 1.5rem;
    opacity: 0.5;
}

.cart-empty h2 {
    font-size: 1.5rem;
    color: var(--dark);
    margin-bottom: 0.5rem;
}

.cart-empty p {
    color: var(--text-light);
    margin-bottom: 2rem;
}

.btn-shop-now {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 2rem;
    background: var(--primary);
    color: var(--white);
    text-decoration: none;
    border-radius: 2rem;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-shop-now:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
}

@media (max-width: 768px) {
    .cart-with-items {
        grid-template-columns: 1fr;
    }
    
    .cart-item {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    
    .cart-item-actions {
        justify-content: center;
    }
    
    .cart-item-total {
        text-align: center;
    }
    
    .cart-summary {
        position: static;
    }
}
</style>

<script>
// Product data mapping with CORRECT IDs (8-13)
const productData = {
    8: { name: 'Canada TikTok Account', price: 3500, icon: 'tiktok-logo.png' },
    9: { name: 'USA Instagram Account', price: 13000, icon: 'instagram-logo.png' },
    10: { name: 'Twitter Account 200 followers', price: 7000, icon: 'twitter-logo.png' },
    11: { name: 'NordVPN Account', price: 4000, icon: 'vpn-logo.png' },
    12: { name: 'Google Voice Number', price: 6500, icon: 'texting-logo.png' },
    13: { name: 'USA Facebook Account', price: 5000, icon: 'facebook-logo.png' }
};

// Format currency
function formatCurrency(amount) {
    return '₦' + amount.toLocaleString();
}

// Load and display cart
function loadCart() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartContent = document.getElementById('cart-content');
    
    if (cart.length === 0) {
        cartContent.innerHTML = `
            <div class="cart-empty">
                <div class="empty-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added any items yet</p>
                <a href="{{ url_for('index') }}" class="btn-shop-now">
                    <i class="fas fa-arrow-left"></i>
                    Continue Shopping
                </a>
            </div>
        `;
        return;
    }
    
    // Group items by product ID and sum quantities
    const groupedItems = {};
    cart.forEach(item => {
        const productId = parseInt(item.id);
        if (groupedItems[productId]) {
            groupedItems[productId].quantity += (item.quantity || 1);
        } else {
            groupedItems[productId] = {
                id: productId,
                quantity: item.quantity || 1
            };
        }
    });
    
    let subtotal = 0;
    let itemsHtml = '';
    
    for (const [id, item] of Object.entries(groupedItems)) {
        const product = productData[id];
        if (product) {
            const itemTotal = product.price * item.quantity;
            subtotal += itemTotal;
            
            // Build image URL using Flask url_for
            const imageUrl = "{{ url_for('static', filename='logos/') }}" + product.icon;
            
            itemsHtml += `
                <div class="cart-item" data-id="${id}">
                    <div class="cart-item-image">
                        <img src="${imageUrl}" alt="${product.name}" onerror="this.src='{{ url_for('static', filename='logos/default-logo.png') }}'">
                    </div>
                    <div class="cart-item-details">
                        <h4 class="cart-item-name">${product.name}</h4>
                        <div class="cart-item-price">${formatCurrency(product.price)}</div>
                        <div class="cart-item-actions">
                            <div class="quantity-selector">
                                <button class="quantity-btn" onclick="updateQuantity(${id}, -1)">-</button>
                                <span class="quantity-value" id="qty-${id}">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${id}, 1)">+</button>
                            </div>
                            <button class="remove-btn" onclick="removeItem(${id})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                    <div class="cart-item-total">
                        ${formatCurrency(itemTotal)}
                    </div>
                </div>
            `;
        }
    }
    
    const total = subtotal;
    const itemCount = Object.keys(groupedItems).length;
    
    cartContent.innerHTML = `
        <div class="cart-with-items">
            <div class="cart-items">
                ${itemsHtml}
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal (${itemCount} item${itemCount !== 1 ? 's' : ''})</span>
                    <span>${formatCurrency(subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>${formatCurrency(total)}</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">
                    Proceed to Checkout <i class="fas fa-arrow-right"></i>
                </button>
                <button class="clear-cart-btn" onclick="clearCart()">
                    <i class="fas fa-trash"></i> Clear Cart
                </button>
            </div>
        </div>
    `;
}

// Update quantity
function updateQuantity(productId, change) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existingItem = cart.find(item => parseInt(item.id) === productId);
    
    if (existingItem) {
        const newQuantity = (existingItem.quantity || 1) + change;
        if (newQuantity <= 0) {
            cart = cart.filter(item => parseInt(item.id) !== productId);
        } else {
            existingItem.quantity = newQuantity;
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
        updateCartCount();
    }
}

// Remove item
function removeItem(productId) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart = cart.filter(item => parseInt(item.id) !== productId);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
    updateCartCount();
    showNotification('Item removed from cart', 'success');
}

// Clear cart
function clearCart() {
    if (confirm('Are you sure you want to clear your cart?')) {
        localStorage.removeItem('cart');
        loadCart();
        updateCartCount();
        showNotification('Cart cleared', 'success');
    }
}

// Proceed to checkout - FIXED: Use the correct product ID
function proceedToCheckout() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
        showNotification('Your cart is empty', 'error');
        return;
    }
    
    // For multiple items, you might want to create a multi-item checkout
    // For now, we'll checkout the first item
    const firstItem = cart[0];
    const productId = parseInt(firstItem.id);
    
    // Make sure the product ID exists (8-13)
    if (productData[productId]) {
        window.location.href = "{{ url_for('checkout', product_id=0) }}".replace('0', productId);
    } else {
        showNotification('Invalid product. Please remove and add again.', 'error');
    }
}

// Update cart count in navbar
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartBadge = document.getElementById('cart-count');
    if (cartBadge) {
        cartBadge.textContent = cart.length;
    }
}

// Show notification
function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>
    `;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}

// Load cart on page load
document.addEventListener('DOMContentLoaded', function() {
    loadCart();
});
</script>
{% endblock %}
